[build-system]
requires = [
    "setuptools>=42",
    "wheel"
]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = [
    "tests"
]
addopts = [
    "--import-mode=importlib",
]
pythonpath = "."
markers = [
    "integration: requires live Sigrid API and a valid REPORT_GENERATOR_TESTS_TOKEN",
]