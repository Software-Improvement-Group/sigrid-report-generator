name: Tests

on:
  pull_request:
  push:
    branches: [ main ]

env:
  SIGRID_REPORT_GENERATOR_NO_UPDATE_CHECK: "1"

jobs:
  unit-tests:
    name: "Unit tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'
          cache-dependency-path: '**/setup.cfg'
      - name: "Install Python dependencies"
        run: pip install -e ".[test]"
      - name: "Unit tests"
        run: pytest --junitxml=unit-results.xml
      - uses: actions/upload-artifact@v7
        if: (!cancelled())
        with:
          name: unit-test-results
          path: unit-results.xml

  integration-tests:
    name: "Integration tests"
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      SIGRID_REPORTGENERATORDEMO_TOKEN: ${{ secrets.SIGRID_REPORTGENERATORDEMO_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'
          cache-dependency-path: '**/setup.cfg'
      - name: "Install Python dependencies"
        run: pip install -e ".[test]"
      - name: "Integration tests"
        run: pytest -m integration --junitxml=integration-results.xml
      - uses: actions/upload-artifact@v7
        if: (!cancelled())
        with:
          name: integration-test-results
          path: integration-results.xml