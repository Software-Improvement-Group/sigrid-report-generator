component_base_dirs:
  - "src/report_generator/generator"
  - "src/report_generator"
  - "src"
  - "tests/report_generator"

exclude:
  - ".*/generate_placeholder_docs.py"

languages:
  - name: "Python"

dependencychecker:
  blocklist: [ ]

thirdpartyfindings:
  enabled: true

architecture:
  undesirable_dependencies:
    - source: "generator"
      target: "presets"
      bidirectional: true
    - source: "context"
      target: "domain"
    - source: "context"
      target: "placeholders"
    - source: "domain"
      target: "placeholders"
    - source: "domain/portfolio"
      target: "domain/system"
      bidirectional: true
    - source: "utils"
      target: ".*"
    - source: "placeholders/formatting"
      target: "placeholders/rendering"
      bidirectional: true
    - source: "placeholders/formatting"
      target: "placeholders/implementations"
    - source: "placeholders/rendering"
      target: "placeholders/implementations"